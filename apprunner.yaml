version: 1.0
runtime: nodejs22

build:
  env:
    # Lets Corepack install Yarn 4 in CI without an interactive prompt.
    - name: COREPACK_ENABLE_DOWNLOAD_PROMPT
      value: "0"
  commands:
    pre-build:
      - corepack enable
    build:
      - yarn install --immutable
      - yarn build

run:
  # Runtime image may not inherit Corepack state from build; enable before any yarn use.
  pre-run:
    - corepack enable
  command: node build/server/index.js
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    # Single worker is often more stable on small App Runner instances.
    - name: WEB_CONCURRENCY
      value: "1"
